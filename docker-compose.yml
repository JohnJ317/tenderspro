services:
  postgres:
    image: postgres:16-alpine
    container_name: tenderpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tenderpro_admin
      POSTGRES_PASSWORD: tenderpro_admin_dev
      POSTGRES_DB: tenderpro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenderpro_admin -d tenderpro"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: tenderpro-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: tenderpro
      MINIO_ROOT_PASSWORD: tenderpro_secret_dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: tenderpro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  miniodata:
  redisdata:
